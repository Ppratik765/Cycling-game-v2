<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycling Game v2 — Downhill</title>
    <meta name="description" content="A first-person physics-driven downhill cycling game built with Three.js and cannon-es." />
  </head>
  <body>
    <!-- Loading overlay shown while assets load -->
    <div id="loading-overlay">

      <!-- Animated SVG Cyclist -->
      <svg id="cyclist-svg" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f2fe"/>
            <stop offset="100%" stop-color="#4facfe"/>
          </linearGradient>
          <linearGradient id="neonGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f093fb"/>
            <stop offset="100%" stop-color="#f5576c"/>
          </linearGradient>
        </defs>

        <!-- Dynamic speed lines behind -->
        <g class="speed-lines" opacity="0.6">
          <line x1="450" y1="200" x2="50" y2="200" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="40 120"/>
          <line x1="480" y1="250" x2="80" y2="250" stroke="url(#neonGrad2)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="60 100"/>
          <line x1="420" y1="150" x2="100" y2="150" stroke="url(#neonGrad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="30 150"/>
        </g>

        <!-- The Bicycle & Rider (group bobs up and down) -->
        <g class="rider-bob">
          <!-- Back Wheel -->
          <g class="wheel wheel-back" style="transform-origin: 140px 260px;">
            <circle cx="140" cy="260" r="50" fill="none" stroke="#1f1f2e" stroke-width="12"/>
            <circle cx="140" cy="260" r="50" fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-dasharray="30 10"/>
            <circle cx="140" cy="260" r="40" fill="none" stroke="#2a2a3a" stroke-width="2"/>
            <path d="M140 220 L140 300 M100 260 L180 260 M111 231 L169 289 M111 289 L169 231" stroke="#3a3a4a" stroke-width="2"/>
            <circle cx="140" cy="260" r="8" fill="#4facfe"/>
          </g>

          <!-- Front Wheel -->
          <g class="wheel wheel-front" style="transform-origin: 360px 260px;">
            <circle cx="360" cy="260" r="50" fill="none" stroke="#1f1f2e" stroke-width="12"/>
            <circle cx="360" cy="260" r="50" fill="none" stroke="url(#neonGrad2)" stroke-width="12" stroke-dasharray="30 10"/>
            <circle cx="360" cy="260" r="40" fill="none" stroke="#2a2a3a" stroke-width="2"/>
            <path d="M360 220 L360 300 M320 260 L400 260 M331 231 L389 289 M331 289 L389 231" stroke="#3a3a4a" stroke-width="2"/>
            <circle cx="360" cy="260" r="8" fill="#f5576c"/>
          </g>

          <!-- Bike Frame -->
          <!-- Top Tube & Seatstay -->
          <path d="M140 260 L190 170 L300 170 L360 260" fill="none" stroke="#2a2a3a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Chainstay & Downtube -->
          <path d="M140 260 L210 260 L300 170" fill="none" stroke="url(#neonGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Seat Tube -->
          <path d="M190 170 L210 260" fill="none" stroke="url(#neonGrad2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          
          <!-- Front Suspension Fork & Handlebars -->
          <line x1="300" y1="170" x2="330" y2="120" stroke="#2a2a3a" stroke-width="8" stroke-linecap="round"/>
          <line x1="330" y1="120" x2="345" y2="115" stroke="url(#neonGrad2)" stroke-width="8" stroke-linecap="round"/>

          <!-- Saddle & Post -->
          <line x1="190" y1="170" x2="175" y2="130" stroke="#2a2a3a" stroke-width="8" stroke-linecap="round"/>
          <path d="M160 130 Q175 125 195 135" fill="none" stroke="url(#neonGrad)" stroke-width="10" stroke-linecap="round"/>

          <!-- Stylized Rider -->
          <!-- Torso -->
          <path d="M175 115 Q250 85 320 105" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
          <!-- Arm -->
          <path d="M315 105 Q340 110 335 120" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
          <!-- Leg (Static, posed for downhill attack position) -->
          <path d="M185 120 Q220 180 210 260" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>

          <!-- Aero Helmet -->
          <path d="M315 95 Q345 90 350 70 Q320 60 300 85 Z" fill="url(#neonGrad2)"/>
          <path d="M350 70 Q355 80 335 90" fill="none" stroke="#00f2fe" stroke-width="4" stroke-linecap="round"/>

          <!-- Pedal Platform -->
          <line x1="210" y1="260" x2="195" y2="260" stroke="#4facfe" stroke-width="8" stroke-linecap="round"/>
        </g>

        <!-- Glowing Ground -->
        <line x1="50" y1="320" x2="450" y2="320" stroke="#2a2a3a" stroke-width="4" stroke-linecap="round"/>
        <line x1="100" y1="320" x2="400" y2="320" stroke="url(#neonGrad)" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      </svg>

      <!-- Progress section -->
      <div id="loading-progress-wrapper">
        <div id="loading-progress-bar">
          <div id="loading-progress-fill"></div>
        </div>
        <p id="loading-status">Initializing engine…</p>
      </div>

      <!-- Error state (hidden by default) -->
      <div id="loading-error" class="loading-error-hidden">
        <p>⚠ Failed to load game assets</p>
        <p id="loading-error-detail"></p>
        <button onclick="location.reload()">Retry</button>
      </div>
    </div>

    <!-- Three.js renderer is appended here -->
    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
